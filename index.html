<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Sizing</title>
    <link href="css/grid.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <section class="grid-con center-grid-con">
            <h1 class="col-span-full justify">Responsive Image Sizing</h1>
        </section>
    </header>

    <main class="grid-con center-grid-con">
         <section class="col-span-full picture-box">
            <h2>Using the <span>&lt;picture&gt;</span> tag</h2>

            <picture>
                <source srcset="images/stars-1200.png" alt="Mountain with starry background" media="(min-width:1200px)">
                <source srcset="images/stars-700.png" alt="Mountain with starry background" media="(min-width:768px)">
                <img src="images/stars-350.png" alt="Mountain with starry background">
            </picture>
         </section>

         <section class="col-span-full picture-box">
            <h2>Using the <span>&lt;img&gt;</span> tag and srcset attribute</h2>

            <!-- from https://www.responsivebreakpoints.com -->
                <img
                sizes="(max-width: 900px) 100vw, 900px"
                srcset="
                images/pexels-pixabay-41162_zh3bjr_c_scale,w_320.jpg 320w,
                images/pexels-pixabay-41162_zh3bjr_c_scale,w_567.jpg 567w,
                images/pexels-pixabay-41162_zh3bjr_c_scale,w_765.jpg 765w,
                images/pexels-pixabay-41162_zh3bjr_c_scale,w_900.jpg 900w"
                src="pexels-pixabay-41162_zh3bjr_c_scale,w_900.jpg"
                alt="Astronaut on the surface of the moon">
         </section>

         <section class="col-span-full picture-box">
            <h2>Using the <span>background-image</span> attribute in CSS</h2>
                
            <div id="css-background-image"></div>
         </section>

    </main>

    <footer>
        <section class="grid-con center-grid-con">
            <p class="col-span-full justify">Kathleen Cuzzocrea 2026</p>
        </section>
    </footer>
    
    <script src="js/script.js"></script>
</body>
</html>
